################
### MONITORES ###
################
source = ~/.config/hypr/monitors.conf

###################
### PROGRAMAS ###
###################
$terminal = kitty
$fileManager = thunar
$menu = rofi -show drun -modi drun
$browser = firefox
$mainMod = SUPER
$volumeStep = 5

#############################
### VARIÁVEIS DE AMBIENTE ###
#############################
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
# ==========================================
# MODO BRUTO ETERNO (VSYNC OFF + GAMEMODE)
# ==========================================

# 1. MATA O VSYNC GLOBALMENTE (OpenGL e Vulkan)
env = __GL_SYNC_TO_VBLANK,0
env = vblank_mode,0



# 3. FORÇA ALTA PERFORMANCE NA NVIDIA
env = DRI_PRIME,1
env = __NV_PRIME_RENDER_OFFLOAD,1
env = __GLX_VENDOR_LIBRARY_NAME,nvidia

# NVIDIA & Wayland Otimizações
env = LIBVA_DRIVER_NAME,nvidia
env = XDG_SESSION_TYPE,wayland
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = GBM_BACKEND,nvidia-drm
env = ELECTRON_OZONE_PLATFORM_HINT,auto
env = MOZ_ENABLE_WAYLAND,1

#######################
### AUTOSTART ###
#######################
exec-once = waybar &
exec-once = wl-paste --watch cliphist store          # Clipboard listener para Super+V
exec-once = awww-daemon                               # Wallpaper daemon (transições animadas)
exec-once = sleep 0.5 && awww img $(find ~/.wallpapers/images -type f | shuf -n 1) --transition-type grow --transition-pos 0.5,0.9 --transition-duration 2
exec-once = quickshell -d -p ~/.config/hypr/scripts/quickshell  # Quickshell popup daemon

#####################
### VISUAL ###
#####################
general {
    gaps_in = 5
    gaps_out = 15
    border_size = 0
    col.active_border = rgba(00000000)
    col.inactive_border = rgba(00000000)
    layout = dwindle
    allow_tearing = true
}

decoration {
    rounding = 15
    active_opacity = 1.0
    inactive_opacity = 0.95

    shadow {
        enabled = true
        range = 30
        render_power = 3
        color = rgba(00000066)
    }

    blur {
        enabled = true
        size = 8
        passes = 3
        new_optimizations = on
        ignore_opacity = true
        popups = true
        input_methods = true
    }
}

animations {
    enabled = true

    # Curvas de animação (Snappy & Fast)
    bezier = snappy, 0.1, 0.9, 0.1, 1.05
    bezier = fastSmooth, 0.05, 0.7, 0.1, 1
    bezier = specialWorkSwitch, 0.05, 0.7, 0.1, 1

    # Layers (barras, menus, overlays)
    animation = layersIn, 1, 3, fastSmooth, slide
    animation = layersOut, 1, 3, fastSmooth, slide
    animation = fadeLayers, 1, 3, fastSmooth

    # Janelas — deslize muito rápido (sem popin)
    animation = windowsIn, 1, 2.5, snappy, slide
    animation = windowsOut, 1, 2.5, snappy, slide
    animation = windowsMove, 1, 3, snappy, slide
    animation = workspaces, 1, 3, fastSmooth, slide

    # Workspace especial (slide vertical suave)
    animation = specialWorkspace, 1, 4, specialWorkSwitch, slidefadevert 15%

    # Fades e bordas
    animation = fade, 1, 3, fastSmooth
    animation = fadeDim, 1, 3, fastSmooth
    animation = border, 1, 3, fastSmooth
}

dwindle {
    pseudotile = true
    preserve_split = true
    smart_split = false
    smart_resizing = true
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    vfr = true
    vrr = 1
}

render {
    direct_scanout = true
}

xwayland {
    force_zero_scaling = true
}

#############
### INPUT ###
#############
input {
    kb_layout = us
    kb_variant =
    follow_mouse = 1
    sensitivity = 0
    touchpad {
        natural_scroll = true
    }
}

##################################
### ATALHOS (KEYBINDS) ###
##################################

# ═══════════════════════════════
# ║       APPS PRINCIPAIS       ║
# ═══════════════════════════════
bind = $mainMod, T, exec, $terminal           # Super + T → Kitty
bind = $mainMod, F, exec, $browser            # Super + F → Firefox
bind = $mainMod, E, exec, $fileManager        # Super + E → Thunar

# ROFI (Abre quando solta a tecla Super)
bindr = SUPER, SUPER_L, exec, $menu

# Abre o Menu de GameMode (Super + G)
bind = $mainMod ALT, G, exec, ~/.config/hypr/scripts/qs_manager.sh toggle gamemode

# ═══════════════════════════════
# ║      AÇÕES DE JANELA        ║
# ═══════════════════════════════
bind = $mainMod, Q, killactive,                        # Fechar janela
bind = $mainMod, M, fullscreen, 0                      # Tela cheia
bind = $mainMod ALT, M, fullscreen, 1                  # Tela cheia com bordas
bind = $mainMod, V, togglefloating,             # Flutuante
bind = $mainMod, P, pin                                 # Fixar janela (sempre visível)
bind = CTRL+$mainMod, Backslash, centerwindow, 1       # Centralizar janela
bind = CTRL+$mainMod ALT, Backslash, resizeactive, exact 55% 70%
bind = CTRL+$mainMod ALT, Backslash, centerwindow, 1   # Centralizar + redimensionar

# Foco nas janelas (setas)
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Mover janela de lugar na tela
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

# Redimensionar janelas (Super + Alt + Setas) — em percentagem
binde = $mainMod ALT, left, resizeactive, -10% 0
binde = $mainMod ALT, right, resizeactive, 10% 0
binde = $mainMod ALT, up, resizeactive, 0 -10%
binde = $mainMod ALT, down, resizeactive, 0 10%

# Redimensionar janelas (Super +/- e Super+Shift +/-)
binde = $mainMod, Minus, resizeactive, -10% 0          # Encolher horizontal
binde = $mainMod, Equal, resizeactive, 10% 0            # Expandir horizontal
binde = $mainMod SHIFT, Minus, resizeactive, 0 -10%    # Encolher vertical
binde = $mainMod SHIFT, Equal, resizeactive, 0 10%     # Expandir vertical

# Mouse — arrastar e redimensionar
bindm = $mainMod, mouse:272, movewindow                # Super + clique esq → arrastar
bindm = $mainMod, mouse:273, resizewindow              # Super + clique dir → redimensionar

# Alt+Tab — Ciclar entre janelas
binde = ALT, Tab, cyclenext
binde = SHIFT ALT, Tab, cyclenext, prev

# Window groups
binde = CTRL ALT, Tab, changegroupactive, f
binde = CTRL SHIFT ALT, Tab, changegroupactive, b
bind = $mainMod, Comma, togglegroup
bind = $mainMod, U, moveoutofgroup
bind = $mainMod SHIFT, Comma, lockactivegroup, toggle

# ═══════════════════════════════
# ║       WORKSPACES            ║
# ═══════════════════════════════

# Ir para workspace # (Super + número)
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Mover janela para workspace # (Super+Shift + número)
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Scroll do mouse para navegar workspaces ← O QUE PEDISTE!
bind = $mainMod, mouse_down, workspace, -1
bind = $mainMod, mouse_up, workspace, +1

# Ctrl+Super + setas para navegar workspaces
binde = CTRL+$mainMod, right, workspace, +1
binde = CTRL+$mainMod, left, workspace, -1
binde = $mainMod, Page_Up, workspace, -1
binde = $mainMod, Page_Down, workspace, +1

# Ctrl+Super+Shift + setas para MOVER janela ← O QUE PEDISTE!
binde = CTRL+$mainMod SHIFT, right, movetoworkspace, +1
binde = CTRL+$mainMod SHIFT, left, movetoworkspace, -1
binde = $mainMod ALT, Page_Up, movetoworkspace, -1
binde = $mainMod ALT, Page_Down, movetoworkspace, +1

# Mouse para mover janela entre workspaces
bind = $mainMod ALT, mouse_down, movetoworkspace, -1
bind = $mainMod ALT, mouse_up, movetoworkspace, +1

# Special workspace (workspace escondido)
bind = $mainMod, S, togglespecialworkspace, special
bind = CTRL+$mainMod SHIFT, up, movetoworkspace, special:special
bind = CTRL+$mainMod SHIFT, down, movetoworkspace, e+0
bind = $mainMod ALT, S, movetoworkspace, special:special

# ═══════════════════════════════
# ║     PRINTS DE TELA          ║
# ═══════════════════════════════
bindl = , Print, exec, grim - | wl-copy                                    # Tela inteira → clipboard
bind = $mainMod SHIFT, S, exec, grim -g "$(slurp)" - | swappy -f -         # Região → editar
bind = $mainMod SHIFT, C, exec, hyprpicker -a                              # Color picker

# ═══════════════════════════════
# ║  VOLUME / BRILHO / MEDIA    ║
# ═══════════════════════════════

# Volume (teclas nativas do notebook)
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ 0; wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ $volumeStep%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ 0; wpctl set-volume @DEFAULT_AUDIO_SINK@ $volumeStep%-
bindl = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindl = $mainMod SHIFT, M, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle   # Super+Shift+M → mute toggle

# Brilho (teclas nativas do notebook)
bindel = ,XF86MonBrightnessUp, exec, brightnessctl s 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl s 5%-

# Media (play/pause/next/prev)
bindl = CTRL+$mainMod, Space, exec, playerctl play-pause
bindl = ,XF86AudioPlay, exec, playerctl play-pause
bindl = ,XF86AudioPause, exec, playerctl play-pause
bindl = ,XF86AudioNext, exec, playerctl next
bindl = ,XF86AudioPrev, exec, playerctl previous
bindl = ,XF86AudioStop, exec, playerctl stop

# ═══════════════════════════════
# ║     CLIPBOARD & EMOJI       ║
# ═══════════════════════════════
bind = $mainMod SHIFT, V, exec, cliphist list | rofi -dmenu -p "Clipboard" | cliphist decode | wl-copy

# ═══════════════════════════════
# ║       WALLPAPER              ║
# ═══════════════════════════════
bind = $mainMod, W, exec, ~/.config/rofi/wallpaper.sh

# ═══════════════════════════════
# ║          SLEEP               ║
# ═══════════════════════════════
bindl = $mainMod SHIFT, L, exec, systemctl suspend-then-hibernate

##############################
### REGRAS DE JANELAS E LAYERS (BLUR) ###
##############################
windowrule = match:class .*, suppress_event maximize
windowrule = match:class ^(rofi)$, float 1
windowrule = match:class ^(kitty)$, opacity 0.85 0.75

# Regras de Camada (Layer) para o Blur do Rofi
layerrule = match:namespace ^(rofi)$, blur on
layerrule = match:namespace ^(rofi)$, ignore_alpha 0


# Avisar as apps modernas e o GTK de que o tema é escuro no arranque
exec-once = gsettings set org.gnome.desktop.interface color-scheme 'prefer-dark'
exec-once = gsettings set org.gnome.desktop.interface gtk-theme 'Arc-Dark'
exec-once = gsettings set org.gnome.desktop.interface icon-theme 'Papirus-Dark'

# Forçar as apps Qt a respeitar a configuração do qt5ct/qt6ct
env = QT_QPA_PLATFORMTHEME,qt5ct
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1

