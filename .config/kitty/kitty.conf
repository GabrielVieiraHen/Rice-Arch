# ── Kitty Terminal — Glassmorphism Blue iOS-Core ──
# Transparência + blur do Hyprland = efeito vidro

# ╔══════════════════════════════════════╗
# ║           FONTE                       ║
# ╚══════════════════════════════════════╝
font_family      JetBrainsMono Nerd Font
bold_font        JetBrainsMono Nerd Font Bold
italic_font      JetBrainsMono Nerd Font Italic
bold_italic_font JetBrainsMono Nerd Font Bold Italic
font_size        11.5

# ╔══════════════════════════════════════╗
# ║        TRANSPARÊNCIA / VIDRO          ║
# ╚══════════════════════════════════════╝
background_opacity 0.55
dynamic_background_opacity yes

# ╔══════════════════════════════════════╗
# ║         CORES — GLASSMORPHISM BLUE    ║
# ╚══════════════════════════════════════╝
# Background base — azul escuro profundo (quase preto)
background  #0a0e1a
# Foreground — branco suave
foreground  #e4e8f7

# Selection
selection_background  #364a82
selection_foreground  #e4e8f7

# Cursor — azul brilhante iOS
cursor            #5b9cf5
cursor_text_color #0a0e1a
cursor_shape      beam
cursor_beam_thickness 2.0
cursor_blink_interval 0.5

# URL
url_color #7aa2f7
url_style curly

# ── ANSI Colors — Paleta iOS Blue Glassmorphism ──

# Black (cinza-azulado escuro)
color0  #1a1f36
color8  #3b4261

# Red (rosa suave, não agressivo)
color1  #f7768e
color9  #ff9e9e

# Green (verde-azulado suave)
color2  #73daca
color10 #9eecd4

# Yellow (amarelo quente suave)
color3  #e0af68
color11 #e9c98a

# Blue (azul iOS principal!)
color4  #5b9cf5
color12 #7aa2f7

# Magenta (lavanda)
color5  #bb9af7
color13 #c8a8ff

# Cyan (ciano claro)
color6  #7dcfff
color14 #a4d8ff

# White
color7  #c0caf5
color15 #e4e8f7

# Cores dinâmicas geradas pelo Matugen (Baseadas no Wallpaper)
include matugen.conf

# ╔══════════════════════════════════════╗
# ║          JANELA / LAYOUT              ║
# ╚══════════════════════════════════════╝
window_padding_width 12 16
# Sem decorações do kitty (usa as do Hyprland)
hide_window_decorations yes

# Bordas internas entre splits
active_border_color   #5b9cf5
inactive_border_color #1a1f36

# Tab bar — estilo moderno
tab_bar_edge         top
tab_bar_style        powerline
tab_powerline_style  slanted
tab_bar_min_tabs     2

active_tab_background   #5b9cf5
active_tab_foreground   #0a0e1a
inactive_tab_background #1a1f36
inactive_tab_foreground #636e95
tab_bar_background      #0a0e14

# ╔══════════════════════════════════════╗
# ║          COMPORTAMENTO                ║
# ╚══════════════════════════════════════╝
scrollback_lines 10000
copy_on_select   clipboard
strip_trailing_spaces smart
enable_audio_bell no
visual_bell_duration 0.0
confirm_os_window_close 0

# Abrir links com clique
mouse_hide_wait 3.0
open_url_with default
detect_urls yes

# Performance (RTX 4050)
repaint_delay 6
input_delay 1
sync_to_monitor yes

# ╔══════════════════════════════════════╗
# ║        ATALHOS DO KITTY               ║
# ╚══════════════════════════════════════╝
# Ctrl+Shift+T — nova tab
# Ctrl+Shift+Enter — novo split
map ctrl+shift+enter new_window
map ctrl+shift+t     new_tab
map ctrl+shift+w     close_window
map ctrl+shift+right next_tab
map ctrl+shift+left  previous_tab
map ctrl+shift+equal change_font_size all +1.0
map ctrl+shift+minus change_font_size all -1.0
map ctrl+shift+0     change_font_size all 0
